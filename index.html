<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrot Escape: Run from the Snake!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦜</text></svg>">
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        header {
            text-align: center;
            padding: 15px;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            border: 3px solid #ff9a00;
            box-shadow: 0 0 20px rgba(255, 154, 0, 0.5);
        }

        h1 {
            font-size: 2.8rem;
            color: #ff9a00;
            text-shadow: 3px 3px 0 #ff3d00;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #4dffea;
        }

        .game-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .left-panel {
            flex: 1;
            min-width: 300px;
            background: rgba(0, 20, 40, 0.8);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #00b4d8;
        }

        .right-panel {
            flex: 2;
            min-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .screen {
            background: #0f3460;
            border-radius: 15px;
            padding: 15px;
            border: 3px solid #ff9a00;
            position: relative;
            overflow: hidden;
            min-height: 400px;
        }

        #gameCanvas {
            background: linear-gradient(to bottom, #1e3c72 0%, #2a5298 100%);
            border-radius: 10px;
            width: 100%;
            height: 400px;
            display: block;
        }

        .profile-section {
            margin-bottom: 20px;
        }

        .profile-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #00b4d8;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
        }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(to right, #ff9a00, #ff3d00);
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px 0;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 61, 0, 0.7);
        }

        #showLeaderboardBtn {
            background: transparent;
            border: 1px solid #4dffea;
            color: #4dffea;
            font-size: 0.9rem;
            margin-top: 10px;
            padding: 8px;
        }

        #leaderboardContainer {
            display: none;
            margin-top: 15px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ff9a00;
            font-size: 0.85rem;
            max-height: 180px;
            overflow-y: auto;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(77, 255, 234, 0.2);
            padding: 5px 0;
        }

        .score-name { color: #ff9a00; font-weight: bold; }
        .score-val { color: #4dffea; }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(0, 40, 80, 0.7);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #4dffea;
        }

        .stat-value {
            font-size: 2rem;
            color: #ff9a00;
            font-weight: bold;
        }

        .music-control {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 300;
        }

        .game-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #ff9a00;
            z-index: 200;
            display: none;
            width: 80%;
        }

        .health-bar-container {
            position: absolute;
            bottom: 20px;
            left: 15px;
            z-index: 300;
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 0.8rem;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐦 Parrot Escape 🐍</h1>
            <p class="subtitle">Jump, run and collect mushrooms while escaping the giant snake!</p>
        </header>

        <div class="game-area">
            <div class="left-panel">
                <div class="profile-section">
                    <h2>🦜 Parrot Profile</h2>
                    <div class="profile-form">
                        <input type="text" id="playerName" placeholder="Enter parrot name" maxlength="15">
                        <input type="text" id="parrotColor" placeholder="Favorite color (e.g., green)" maxlength="10">
                        <button id="saveProfile">Save Profile</button>
                    </div>
                    <div class="stats">
                        <div class="stat-box"><div>Level</div><div class="stat-value" id="currentLevel">1</div></div>
                        <div class="stat-box"><div>Score</div><div class="stat-value" id="currentScore">0</div></div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="screen">
                    <div class="music-control" id="musicToggle">🔊</div>
                    <canvas id="gameCanvas" width="800" height="400"></canvas>
                    <div class="health-bar-container">❤️ Lives: <span id="livesDisplay">3</span></div>

                    <!-- СЪОБЩЕНИЯ -->
                    <div class="game-message" id="startMessage">
                        <h2>Ready to Fly? 🦜</h2>
                        <button id="startButton">START GAME</button>
                        <br>
                        <button id="showLeaderboardBtn">🏆 Класация (Топ 10)</button>
                        <div id="leaderboardContainer">
                            <div id="leaderboardList">Зареждане...</div>
                        </div>
                    </div>

                    <div class="game-message" id="gameOverMessage">
                        <h2>Game Over! 😱</h2>
                        <button id="restartButton">Try Again</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ══ SUPABASE CONFIG (SAFE BOOT) ══
        const SUPABASE_URL = 'https://zvymktjzbmdnvhdcpnrs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jz_J3ovv-gUU-RYvHXR4YA_V5Akc1sk';
        let supabaseClient = null;

        try {
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (e) { console.error("Cloud Error:", e); }

        async function saveToLeaderboard(name, score, level) {
            if (!supabaseClient || !name || score <= 0) return;
            await supabaseClient.from('high_scores').insert([{ player_name: name, score: score, level: level }]);
        }

        async function getTopScores() {
            if (!supabaseClient) return [];
            const { data } = await supabaseClient.from('high_scores').select('*').order('score', { ascending: false }).limit(10);
            return data || [];
        }

        // ══ AUDIO ENGINE ══
        const AudioEngine = (() => {
            let ctx = null, sfxGain = null;
            function init() {
                if (ctx) return;
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                sfxGain = ctx.createGain(); sfxGain.connect(ctx.destination);
            }
            return { 
                init, 
                playJump: () => {
                    if(!ctx) return;
                    const o = ctx.createOscillator(); const g = ctx.createGain();
                    o.frequency.setValueAtTime(400, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
                    o.connect(g); g.connect(sfxGain); o.start(); o.stop(ctx.currentTime + 0.2);
                }
            };
        })();

        // ══ GAME LOGIC ══
        const gameState = { currentLevel: 1, score: 0, isPlaying: false, playerName: "Parrot", parrotColor: "#4CAF50", keys: {} };
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let parrot = { x: 80, y: 310, vY: 0 };
        let snake = { x: 850, y: 310, speed: 3 };

        function initGame() {
            document.getElementById('startMessage').style.display = 'block';
            ctx.fillStyle = "#1e3c72"; ctx.fillRect(0,0,800,400);
            ctx.fillStyle = "#5d3a1a"; ctx.fillRect(0, 365, 800, 35);
        }

        function updateGame() {
            if (!gameState.isPlaying) return;
            ctx.clearRect(0, 0, 800, 400);
            ctx.fillStyle = "#1e3c72"; ctx.fillRect(0,0,800,400);
            ctx.fillStyle = "#5d3a1a"; ctx.fillRect(0, 365, 800, 35);

            parrot.vY += 0.6; parrot.y += parrot.vY;
            if (parrot.y > 330) { parrot.y = 330; parrot.vY = 0; }
            if (gameState.keys['Space'] && parrot.y >= 330) { parrot.vY = -13; AudioEngine.playJump(); }

            snake.x -= snake.speed;
            if (snake.x < -50) snake.x = 850;

            if (Math.abs(parrot.x - snake.x) < 30 && Math.abs(parrot.y - snake.y) < 30) { gameOver(); }

            ctx.fillStyle = gameState.parrotColor; ctx.beginPath(); ctx.arc(parrot.x+20, parrot.y+15, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.ellipse(snake.x+20, snake.y+15, 25, 10, 0, 0, Math.PI*2); ctx.fill();

            gameState.score++;
            document.getElementById('currentScore').innerText = gameState.score;
            requestAnimationFrame(updateGame);
        }

        function gameOver() {
            gameState.isPlaying = false;
            saveToLeaderboard(gameState.playerName, gameState.score, gameState.currentLevel);
            document.getElementById('gameOverMessage').style.display = 'block';
        }

        // ══ EVENTS ══
        document.getElementById('startButton').addEventListener('click', () => {
            AudioEngine.init();
            document.getElementById('startMessage').style.display = 'none';
            gameState.isPlaying = true; gameState.score = 0;
            updateGame();
        });

        document.getElementById('restartButton').addEventListener('click', () => location.reload());

        document.getElementById('showLeaderboardBtn').addEventListener('click', async () => {
            const container = document.getElementById('leaderboardContainer');
            const list = document.getElementById('leaderboardList');
            if (container.style.display === 'block') { container.style.display = 'none'; return; }
            container.style.display = 'block';
            list.innerHTML = "Зареждане...";
            const scores = await getTopScores();
            list.innerHTML = scores.length ? scores.map((s, i) => `<div class="score-row"><span>${i+1}. ${s.player_name}</span><span>${s.score}</span></div>`).join('') : "Няма записи.";
        });

        document.getElementById('saveProfile').addEventListener('click', () => {
            const n = document.getElementById('playerName').value;
            if (n) { gameState.playerName = n; alert("Името е запазено!"); }
        });

        window.addEventListener('keydown', e => gameState.keys[e.code] = true);
        window.addEventListener('keyup', e => gameState.keys[e.code] = false);

        // СТАРТ
        initGame();
    </script>
</body>
</html>
