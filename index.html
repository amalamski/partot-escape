<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrot Escape: Run from the Snake!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦜</text></svg>">
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        header {
            text-align: center;
            padding: 15px;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            border: 3px solid #ff9a00;
            box-shadow: 0 0 20px rgba(255, 154, 0, 0.5);
        }

        h1 {
            font-size: 2.8rem;
            color: #ff9a00;
            text-shadow: 3px 3px 0 #ff3d00;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #4dffea;
        }

        .game-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .left-panel {
            flex: 1;
            min-width: 300px;
            background: rgba(0, 20, 40, 0.8);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #00b4d8;
        }

        .right-panel {
            flex: 2;
            min-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .screen {
            background: #0f3460;
            border-radius: 15px;
            padding: 15px;
            border: 3px solid #ff9a00;
            position: relative;
            overflow: hidden;
            min-height: 400px;
        }

        #gameCanvas {
            background: linear-gradient(to bottom, #1e3c72 0%, #2a5298 100%);
            border-radius: 10px;
            width: 100%;
            height: 400px;
            display: block;
        }

        .profile-section { margin-bottom: 20px; }
        .profile-form { display: flex; flex-direction: column; gap: 10px; }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #00b4d8;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
        }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(to right, #ff9a00, #ff3d00);
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px 0;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 61, 0, 0.7);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(0, 40, 80, 0.7);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #4dffea;
        }

        .stat-value {
            font-size: 2rem;
            color: #ff9a00;
            font-weight: bold;
        }

        .controls {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .key {
            display: inline-block;
            width: 45px;
            height: 45px;
            background: #333;
            color: white;
            border-radius: 8px;
            text-align: center;
            line-height: 45px;
            margin: 2px;
            font-weight: bold;
            border: 2px solid #666;
        }

        .key.active {
            background: #ff9a00;
            transform: translateY(3px);
        }

        .music-control {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 300;
        }

        .level-indicator {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            color: #ff9a00;
            z-index: 300;
        }

        .rewards {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .reward { font-size: 2rem; filter: grayscale(1); transition: all 0.3s; }
        .reward.unlocked { filter: grayscale(0); transform: scale(1.2); }

        .health-bar-container {
            position: absolute;
            bottom: 20px;
            left: 15px;
            z-index: 300;
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 0.8rem;
            color: #fff;
        }

        .game-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #ff9a00;
            z-index: 400;
            display: none;
            width: 85%;
        }

        .volume-slider-container {
            position: absolute;
            top: 55px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 12px;
            border-radius: 10px;
            z-index: 300;
            display: none;
