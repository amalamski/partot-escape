<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrot Escape: Run from the Snake!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦜</text></svg>">
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        header {
            text-align: center;
            padding: 15px;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            border: 3px solid #ff9a00;
            box-shadow: 0 0 20px rgba(255, 154, 0, 0.5);
        }

        h1 {
            font-size: 2.8rem;
            color: #ff9a00;
            text-shadow: 3px 3px 0 #ff3d00;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #4dffea;
        }

        .game-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .left-panel {
            flex: 1;
            min-width: 300px;
            background: rgba(0, 20, 40, 0.8);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #00b4d8;
        }

        .right-panel {
            flex: 2;
            min-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .screen {
            background: #0f3460;
            border-radius: 15px;
            padding: 15px;
            border: 3px solid #ff9a00;
            position: relative;
            overflow: hidden;
            min-height: 400px;
        }

        #gameCanvas {
            background: linear-gradient(to bottom, #1e3c72 0%, #2a5298 100%);
            border-radius: 10px;
            width: 100%;
            height: 400px;
            display: block;
        }

        .profile-section {
            margin-bottom: 20px;
        }

        .profile-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #00b4d8;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
        }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(to right, #ff9a00, #ff3d00);
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px 0;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 61, 0, 0.7);
        }

        /* Leaderboard Specific Styles */
        #showLeaderboardBtn {
            background: transparent;
            border: 1px solid #4dffea;
            color: #4dffea;
            font-size: 0.9rem;
            margin-top: 10px;
            padding: 8px;
        }

        #leaderboardContainer {
            display: none;
            margin-top: 15px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ff9a00;
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(77, 255, 234, 0.2);
            padding: 5px 0;
        }

        .score-name { color: #ff9a00; font-weight: bold; }
        .score-val { color: #4dffea; }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(0, 40, 80, 0.7);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #4dffea;
        }

        .stat-value {
            font-size: 2rem;
            color: #ff9a00;
            font-weight: bold;
        }

        .controls {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .key {
            display: inline-block;
            width: 50px;
            height: 50px;
            background: #333;
            color: white;
            border-radius: 8px;
            text-align: center;
            line-height: 50px;
            margin: 5px;
            font-weight: bold;
            border: 2px solid #666;
            box-shadow: 0 4px 0 #222;
        }

        .key.active {
            background: #ff9a00;
            transform: translateY(4px);
            box-shadow: 0 0 0 #222;
        }

        .music-control {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 300;
        }

        .volume-slider-container {
            position: absolute;
            top: 55px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 12px;
            border-radius: 10px;
            z-index: 300;
            display: none;
            flex-direction: column;
            gap: 6px;
            font-size: 0.75rem;
            color: #4dffea;
            border: 1px solid #00b4d8;
        }

        .volume-slider-container.show {
            display: flex;
        }

        .level-indicator {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            color: #ff9a00;
            z-index: 300;
        }

        .rewards {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .reward {
            font-size: 2rem;
            filter: grayscale(1);
            transition: all 0.3s;
        }

        .reward.unlocked {
            filter: grayscale(0);
            transform: scale(1.2);
        }

        .game-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #ff9a00;
            z-index: 200;
            display: none;
            width: 80%;
        }

        .health-bar-container {
            position: absolute;
            bottom: 20px;
            left: 15px;
            z-index: 300;
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 0.8rem;
            color: #fff;
        }

        @media (max-width: 850px) {
            .game-area { flex-direction: column; }
            .left-panel, .right-panel { min-width: 100%; }
            h1 { font-size: 2rem; }
            .stat-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐦 Parrot Escape 🐍</h1>
            <p class="subtitle">Jump, run and collect mushrooms while escaping the giant snake!</p>
        </header>

        <div class="game-area">
            <div class="left-panel">
                <div class="profile-section">
                    <h2>🦜 Parrot Profile</h2>
                    <div class="profile-form">
                        <input type="text" id="playerName" placeholder="Enter parrot name" maxlength="15">
                        <input type="text" id="parrotColor" placeholder="Favorite color (e.g., green)" maxlength="10">
                        <button id="saveProfile">Save Profile</button>
                        <button id="loadProfile">Load Progress</button>
                    </div>
                    <div class="stats">
                        <div class="stat-box"><div>Level</div><div class="stat-value" id="currentLevel">1</div></div>
                        <div class="stat-box"><div>Score</div><div class="stat-value" id="currentScore">0</div></div>
                    </div>
                </div>

                <div class="rewards-section">
                    <h2>🏆 Rewards</h2>
                    <div class="rewards">
                        <div class="reward" id="reward1">🥉</div>
                        <div class="reward" id="reward2">🥈</div>
                        <div class="reward" id="reward3">🥇</div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="screen">
                    <div class="level-indicator" id="levelIndicator">Level 1: Jungle 🌴</div>
                    <div class="music-control" id="musicToggle">🔊</div>
                    <div class="volume-slider-container" id="volumePanel">
                        <label>🎵 Music <input type="range" id="musicVolume" min="0" max="100" value="40"></label>
                    </div>

                    <canvas id="gameCanvas" width="800" height="400"></canvas>

                    <div class="health-bar-container">❤️ Lives: <span id="livesDisplay">3</span></div>

                    <!-- START SCREEN WITH LEADERBOARD -->
                    <div class="game-message" id="startMessage">
                        <h2>Ready to Fly? 🦜</h2>
                        <button id="startButton">START GAME</button>
                        <br>
                        <button id="showLeaderboardBtn">🏆 Класация (Топ 10)</button>
                        <div id="leaderboardContainer">
                            <div id="leaderboardList">Зареждане...</div>
                        </div>
                    </div>

                    <div class="game-message" id="levelCompleteMessage">
                        <h2>Level Complete! 🎉</h2>
                        <button id="nextLevelButton">Next Level →</button>
                    </div>

                    <div class="game-message" id="gameOverMessage">
                        <h2>Game Over! 😱</h2>
                        <button id="restartButton">Try Again</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ══ SUPABASE CONFIG ══
        const SUPABASE_URL = 'https://zvymktjzbmdnvhdcpnrs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jz_J3ovv-gUU-RYvHXR4YA_V5Akc1sk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function saveToLeaderboard(name, score, level) {
            if (!name || score <= 0) return;
            const { error } = await supabaseClient
                .from('high_scores')
                .insert([{ player_name: name, score: score, level: level }]);
            if (error) console.error('Error saving:', error);
        }

        async function getTopScores() {
            const { data, error } = await supabaseClient
                .from('high_scores')
                .select('*')
                .order('score', { ascending: false })
                .limit(10);
            if (error) console.error('Error loading:', error);
            return data || [];
        }

        // ══ AUDIO ENGINE ══
        const AudioEngine = (() => {
            let ctx = null, musicGain = null, sfxGain = null, masterGain = null;
            function init() {
                if (ctx) return;
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = ctx.createGain(); masterGain.connect(ctx.destination);
                musicGain = ctx.createGain(); musicGain.gain.value = 0.4; musicGain.connect(masterGain);
                sfxGain = ctx.createGain(); sfxGain.gain.value = 0.6; sfxGain.connect(masterGain);
            }
            function playTone(freq, dur) {
                if (!ctx) return;
                const osc = ctx.createOscillator(); const g = ctx.createGain();
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                osc.connect(g); g.connect(sfxGain);
                osc.start(); osc.stop(ctx.currentTime + dur);
            }
            return { init, playJump: () => playTone(400, 0.2), playClick: () => playTone(800, 0.1) };
        })();

        // ══ GAME LOGIC ══
        const gameState = {
            currentLevel: 1, score: 0, lives: 3, isPlaying: false,
            playerName: "Parrot", parrotColor: "#4CAF50", keys: {}
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let parrot = { x: 80, y: 310, width: 40, height: 35, vY: 0 };
        let snake = { x: 850, y: 310, speed: 3 };

        function updateGame() {
            if (!gameState.isPlaying) return;
            ctx.clearRect(0, 0, 800, 400);
            
            // Background & Ground
            ctx.fillStyle = "#1e3c72"; ctx.fillRect(0,0,800,400);
            ctx.fillStyle = "#5d3a1a"; ctx.fillRect(0, 365, 800, 35);

            // Physics
            parrot.vY += 0.6; parrot.y += parrot.vY;
            if (parrot.y > 330) { parrot.y = 330; parrot.vY = 0; }
            if (gameState.keys['Space'] && parrot.y >= 330) { parrot.vY = -13; AudioEngine.playJump(); }

            snake.x -= snake.speed;
            if (snake.x < -50) snake.x = 850;

            // Collision
            let dx = parrot.x - snake.x; let dy = parrot.y - snake.y;
            if (Math.sqrt(dx*dx + dy*dy) < 30) { gameOver(); }

            // Draw
            ctx.fillStyle = gameState.parrotColor; ctx.beginPath(); ctx.arc(parrot.x+20, parrot.y+15, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.ellipse(snake.x+20, snake.y+15, 25, 10, 0, 0, Math.PI*2); ctx.fill();

            gameState.score++;
            document.getElementById('currentScore').innerText = gameState.score;
            requestAnimationFrame(updateGame);
        }

        function gameOver() {
            gameState.isPlaying = false;
            saveToLeaderboard(gameState.playerName, gameState.score, gameState.currentLevel);
            document.getElementById('gameOverMessage').style.display = 'block';
        }

        // ══ UI EVENTS ══
        document.getElementById('startButton').addEventListener('click', () => {
            AudioEngine.init();
            document.getElementById('startMessage').style.display = 'none';
            gameState.isPlaying = true;
            gameState.score = 0;
            updateGame();
        });

        document.getElementById('restartButton').addEventListener('click', () => location.reload());

        // LEADERBOARD TOGGLE
        const leaderboardBtn = document.getElementById('showLeaderboardBtn');
        const leaderboardContainer = document.getElementById('leaderboardContainer');
        const leaderboardList = document.getElementById('leaderboardList');

        leaderboardBtn.addEventListener('click', async () => {
            if (leaderboardContainer.style.display === 'block') {
                leaderboardContainer.style.display = 'none';
                return;
            }
            leaderboardContainer.style.display = 'block';
            leaderboardList.innerHTML = "Търсим шампионите...";
            
            const scores = await getTopScores();
            if (scores.length === 0) {
                leaderboardList.innerHTML = "Няма записи още.";
            } else {
                leaderboardList.innerHTML = scores.map((s, i) => `
                    <div class="score-row">
                        <span>${i+1}. <span class="score-name">${s.player_name}</span></span>
                        <span class="score-val">${s.score} (Lvl ${s.level})</span>
                    </div>
                `).join('');
            }
        });

        document.getElementById('saveProfile').addEventListener('click', () => {
            const name = document.getElementById('playerName').value;
            if (name) {
                gameState.playerName = name;
                alert("Профилът е запазен!");
            }
        });

        window.addEventListener('keydown', e => gameState.keys[e.code] = true);
        window.addEventListener('keyup', e => gameState.keys[e.code] = false);

    </script>
</body>
</html>
